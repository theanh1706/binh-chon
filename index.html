<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b57d0">
  <title>Bình chọn trực tuyến</title>
  <!-- PHIÊN BẢN V5: HIỂN THỊ NGƯỜI THẮNG CUỘC -->
  <style>
    :root {
      --primary:#0b57d0; --primary-dark:#073b91; --bg:#f4f7fb;
      --card:#fff; --text:#172033; --muted:#687386; --border:#dbe3ef;
      --success:#11823b; --danger:#c62828;
      --shadow:0 10px 30px rgba(34,53,84,.12);
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top left,rgba(11,87,208,.12),transparent 35%),
                 linear-gradient(180deg,#fff 0%,var(--bg) 100%);
    }
    .page { width:min(1080px,calc(100% - 28px)); margin:auto; padding:28px 0 52px; }
    .hero { text-align:center; margin-bottom:20px; }
    .eyebrow {
      display:inline-block; margin-bottom:10px; padding:7px 13px; border-radius:999px;
      color:var(--primary); background:rgba(11,87,208,.09); font-weight:800;
      font-size:13px; letter-spacing:.06em;
    }
    h1 { margin:0; color:var(--primary-dark); font-size:clamp(30px,6vw,52px); line-height:1.08; }
    .subtitle { margin:12px auto 0; max-width:690px; color:var(--muted); font-size:17px; line-height:1.5; }
    .timer-card {
      max-width:560px; margin:20px auto 24px; padding:18px; border:1px solid var(--border);
      border-radius:18px; background:#fff; box-shadow:var(--shadow); text-align:center;
    }
    .status-label { color:var(--muted); font-size:14px; font-weight:800; letter-spacing:.06em; }
    .countdown {
      margin-top:5px; color:var(--primary-dark); font-size:clamp(42px,10vw,70px);
      line-height:1; font-weight:900; font-variant-numeric:tabular-nums;
    }
    .countdown.waiting { font-size:clamp(24px,5vw,34px); line-height:1.2; }
    .countdown.ended { color:var(--danger); font-size:clamp(25px,5vw,38px); }
    .notice {
      display:none; margin:0 auto 20px; max-width:760px; padding:13px 16px;
      border-radius:12px; font-weight:700; text-align:center; line-height:1.45;
    }
    .notice.show { display:block; }
    .notice.success { color:#0b6f31; background:#e9f8ef; border:1px solid #bde8cc; }
    .notice.error { color:#9d1e1e; background:#fff0f0; border:1px solid #f0c7c7; }
    .notice.info { color:#174d91; background:#edf5ff; border:1px solid #c9ddf8; }
    .grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:16px; }
    .candidate {
      overflow:hidden; border:1px solid var(--border); border-radius:18px;
      background:var(--card); box-shadow:var(--shadow);
    }
    .photo {
      width:100%; aspect-ratio:4/5; display:grid; place-items:center; overflow:hidden;
      background:linear-gradient(135deg,#e9f1ff,#d7e5fb); color:var(--primary);
      font-size:54px; font-weight:900;
    }
    .photo img { width:100%; height:100%; object-fit:cover; display:block; }
    .candidate-body { padding:16px; text-align:center; }
    .candidate-name {
      min-height:48px; margin:0 0 14px; display:flex; align-items:center;
      justify-content:center; font-size:19px; line-height:1.25;
    }
    button { border:0; cursor:pointer; font:inherit; }
    .vote-btn {
      width:100%; padding:12px 10px; border-radius:11px; color:#fff;
      background:linear-gradient(135deg,var(--primary),#2477e8); font-weight:900;
      box-shadow:0 8px 18px rgba(11,87,208,.24);
    }
    .vote-btn:disabled { cursor:not-allowed; opacity:.48; box-shadow:none; }
    .loading { grid-column:1/-1; padding:45px 20px; text-align:center; color:var(--muted); font-size:18px; }
    .results {
      display:none; margin-top:28px; padding:24px; border:1px solid var(--border);
      border-radius:18px; background:#fff; box-shadow:var(--shadow);
    }
    .results.show { display:block; }
    .results h2 { margin:0 0 18px; text-align:center; color:var(--primary-dark); font-size:29px; }

    .winner-section {
      display:flex;
      flex-direction:column;
      align-items:center;
      margin:4px auto 30px;
      text-align:center;
    }
    .winner-label {
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-bottom:14px;
      padding:9px 17px;
      border-radius:999px;
      color:#7a4a00;
      background:linear-gradient(135deg,#fff7cc,#ffe89a);
      border:1px solid #f2cf65;
      font-size:15px;
      font-weight:900;
      letter-spacing:.06em;
    }
    .winner-card {
      width:min(430px,100%);
      padding:22px;
      border-radius:24px;
      border:3px solid #f0c24b;
      background:linear-gradient(145deg,#fffdf4,#fff6cf);
      box-shadow:0 20px 50px rgba(151,105,0,.22);
    }
    .winner-photo {
      width:min(250px,72vw);
      aspect-ratio:4/5;
      margin:0 auto 18px;
      display:grid;
      place-items:center;
      overflow:hidden;
      border-radius:22px;
      border:5px solid #fff;
      background:linear-gradient(135deg,#fff2b0,#ffd86a);
      box-shadow:0 14px 34px rgba(120,84,0,.22);
      color:#805300;
      font-size:74px;
      font-weight:900;
    }
    .winner-photo img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .winner-name {
      margin:0;
      color:#7a4a00;
      font-size:clamp(30px,6vw,45px);
      line-height:1.08;
      font-weight:900;
    }
    .winner-votes {
      margin-top:13px;
      color:#073b91;
      font-size:clamp(29px,6vw,43px);
      font-weight:900;
    }
    .winner-votes span {
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:15px;
      font-weight:700;
    }
    .winner-percent {
      margin-top:7px;
      color:#a56b00;
      font-size:20px;
      font-weight:900;
    }
    .other-title {
      margin:0 0 14px;
      color:var(--muted);
      text-align:center;
      font-size:17px;
      font-weight:800;
    }
    .other-results {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .other-card {
      display:grid;
      grid-template-columns:62px minmax(0,1fr) auto;
      gap:12px;
      align-items:center;
      padding:12px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#f7f9fc;
    }
    .other-photo {
      width:62px;
      height:76px;
      display:grid;
      place-items:center;
      overflow:hidden;
      border-radius:11px;
      background:linear-gradient(135deg,#e9f1ff,#d7e5fb);
      color:var(--primary);
      font-size:22px;
      font-weight:900;
    }
    .other-photo img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .other-info { min-width:0; }
    .other-name {
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:16px;
      font-weight:900;
    }
    .other-bar {
      height:9px;
      margin-top:8px;
      overflow:hidden;
      border-radius:999px;
      background:#e2e8f1;
    }
    .other-bar-fill {
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg,#7893b9,#9db3d0);
    }
    .other-score {
      min-width:62px;
      color:var(--primary-dark);
      text-align:right;
      font-size:17px;
      font-weight:900;
    }
    .other-score span {
      display:block;
      margin-top:3px;
      color:var(--muted);
      font-size:11px;
      font-weight:700;
    }
    .footer-note { margin:25px auto 0; color:var(--muted); text-align:center; font-size:13px; }
    @media(max-width:900px) { .grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media(max-width:620px) {
      .page { width:min(100% - 20px,1080px); padding-top:20px; }
      .grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:11px; }
      .candidate-body { padding:12px; }
      .candidate-name { min-height:42px; font-size:16px; }
      .vote-btn { padding:11px 7px; font-size:15px; }
      .results { padding:18px 13px; }
      .winner-card { padding:17px; }
      .winner-photo { width:min(220px,72vw); }
      .other-results { grid-template-columns:1fr; }
      .other-card { grid-template-columns:54px minmax(0,1fr) 58px; gap:9px; padding:10px; }
      .other-photo { width:54px; height:66px; }
      .other-name { font-size:15px; }
      .other-score { min-width:58px; font-size:15px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="eyebrow">BÌNH CHỌN TRỰC TUYẾN</div>
      <h1>Hãy chọn người bạn yêu thích</h1>
      <p class="subtitle">Chỉ có thể bình chọn trong 2 phút. Kết quả chỉ xuất hiện sau khi đồng hồ kết thúc.</p>
    </header>

    <section class="timer-card" aria-live="polite">
      <div id="statusLabel" class="status-label">ĐANG KIỂM TRA TRẠNG THÁI</div>
      <div id="countdown" class="countdown waiting">VUI LÒNG CHỜ...</div>
    </section>

    <div id="notice" class="notice" role="status" aria-live="polite"></div>

    <section id="candidateGrid" class="grid">
      <div class="loading">Đang tải danh sách...</div>
    </section>

    <section id="results" class="results">
      <h2>Kết quả bình chọn</h2>
      <div id="resultList"></div>
    </section>

    <p class="footer-note">Mỗi thiết bị chỉ bình chọn một lần trong mỗi vòng.</p>
  </main>

  <script>

    const SUPABASE_URL = 'https://eetciufgtzxrxybteraz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_jXMUla3Oq6exg4yglQ92KA_NUV3hrFS';

    async function supabaseRequest(path, options = {}) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 12000);

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
          ...options,
          signal: controller.signal,
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            ...(options.headers || {})
          }
        });

        const text = await response.text();
        let data = null;

        if (text) {
          try {
            data = JSON.parse(text);
          } catch {
            data = text;
          }
        }

        if (!response.ok) {
          const details =
            data?.message ||
            data?.details ||
            (typeof data === "string" ? data : `HTTP ${response.status}`);
          throw new Error(details);
        }

        return data;
      } finally {
        clearTimeout(timeout);
      }
    }

    function rpc(functionName, params = {}) {
      return supabaseRequest(`rpc/${functionName}`, {
        method: "POST",
        body: JSON.stringify(params)
      });
    }


    const grid = document.getElementById("candidateGrid");
    const notice = document.getElementById("notice");
    const statusLabel = document.getElementById("statusLabel");
    const countdown = document.getElementById("countdown");
    const resultsBox = document.getElementById("results");
    const resultList = document.getElementById("resultList");

    let candidates = [];
    let status = { phase:"loading", starts_at:null, ends_at:null };
    let submitting = false;
    let statusRefreshing = false;
    let serverOffsetMs = 0;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }

    function showNotice(message,type="info") {
      notice.textContent = message;
      notice.className = `notice show ${type}`;
    }

    function clearNotice() {
      notice.textContent = "";
      notice.className = "notice";
    }

    function initials(name) {
      return String(name || "?").trim().split(/\s+/).slice(-2)
        .map(part => part.charAt(0)).join("").toUpperCase();
    }

    function makeUuid() {
      if (crypto?.randomUUID) return crypto.randomUUID();
      return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === "x" ? r : (r & 3 | 8);
        return v.toString(16);
      });
    }

    function getVoterToken() {
      let token = localStorage.getItem("vote_voter_token");
      if (!token) {
        token = makeUuid();
        localStorage.setItem("vote_voter_token", token);
      }
      return token;
    }

    function sessionKey() { return status.starts_at || "no-session"; }
    function hasVotedLocally() {
      return localStorage.getItem("vote_completed_session") === sessionKey();
    }

    function formatTime(seconds) {
      const safe = Math.max(0, Number(seconds) || 0);
      return `${String(Math.floor(safe/60)).padStart(2,"0")}:${String(safe%60).padStart(2,"0")}`;
    }

    function renderCandidates() {
      if (!candidates.length) {
        grid.innerHTML = '<div class="loading">Chưa có người nào trong danh sách bình chọn.</div>';
        return;
      }

      const active = status.phase === "active";
      const alreadyVoted = active && hasVotedLocally();

      grid.innerHTML = candidates.map(candidate => {
        const image = candidate.image_url
          ? `<img src="${escapeHtml(candidate.image_url)}" alt="${escapeHtml(candidate.name)}" loading="lazy">`
          : escapeHtml(initials(candidate.name));

        let buttonText = "Chưa bắt đầu";
        if (status.phase === "active") buttonText = alreadyVoted ? "Đã bình chọn" : "Bình chọn";
        if (status.phase === "ended") buttonText = "Đã kết thúc";

        return `<article class="candidate">
          <div class="photo">${image}</div>
          <div class="candidate-body">
            <h2 class="candidate-name">${escapeHtml(candidate.name)}</h2>
            <button class="vote-btn" type="button" data-id="${candidate.id}"
              ${(!active || alreadyVoted) ? "disabled" : ""}>${buttonText}</button>
          </div>
        </article>`;
      }).join("");

      grid.querySelectorAll(".vote-btn").forEach(button => {
        button.addEventListener("click", () => submitVote(Number(button.dataset.id)));
      });
    }

    async function loadCandidates() {
      try {
        const data = await supabaseRequest(
          "candidates?select=id,name,image_url,sort_order&order=sort_order.asc",
          { method:"GET" }
        );
        candidates = Array.isArray(data) ? data : [];
        renderCandidates();
      } catch (error) {
        console.error(error);
        grid.innerHTML = '<div class="loading">Không thể tải danh sách.</div>';
        showNotice(`Không kết nối được Supabase: ${error.message}`, "error");
      }
    }

    function updateTimerDisplay() {
      if (status.phase === "not_started") {
        statusLabel.textContent = "TRẠNG THÁI";
        countdown.textContent = "CHƯA BẮT ĐẦU";
        countdown.className = "countdown waiting";
        return;
      }

      if (status.phase === "ended") {
        statusLabel.textContent = "TRẠNG THÁI";
        countdown.textContent = "ĐÃ KẾT THÚC";
        countdown.className = "countdown ended";
        return;
      }

      if (status.phase === "active" && status.ends_at) {
        const remaining = Math.max(
          0,
          Math.ceil((new Date(status.ends_at).getTime() - (Date.now() + serverOffsetMs)) / 1000)
        );
        statusLabel.textContent = "THỜI GIAN CÒN LẠI";
        countdown.textContent = formatTime(remaining);
        countdown.className = "countdown";
        if (remaining <= 0) refreshStatus(true);
        return;
      }

      statusLabel.textContent = "ĐANG KIỂM TRA";
      countdown.textContent = "VUI LÒNG CHỜ...";
      countdown.className = "countdown waiting";
    }

    async function refreshStatus(force=false) {
      if (statusRefreshing) return;
      statusRefreshing = true;

      try {
        const previousPhase = status.phase;
        const previousSession = status.starts_at;
        const data = await rpc("vote_status_v3");
        status = data || { phase:"not_started" };

        if (status.server_now) {
          serverOffsetMs = new Date(status.server_now).getTime() - Date.now();
        }

        updateTimerDisplay();

        if (previousPhase !== status.phase || previousSession !== status.starts_at || force) {
          resultsBox.classList.remove("show");
          grid.style.display = "";
          renderCandidates();

          if (status.phase === "not_started") {
            clearNotice();
          } else if (status.phase === "active") {
            if (hasVotedLocally()) {
              showNotice("Phiếu của bạn đã được ghi nhận. Kết quả sẽ hiện khi hết giờ.","success");
            } else {
              showNotice("Cuộc bình chọn đã bắt đầu. Hãy chọn trước khi hết giờ!","info");
            }
          } else if (status.phase === "ended") {
            showNotice("Thời gian bình chọn đã kết thúc. Đây là kết quả cuối cùng.","info");
            await loadResults();
          }
        }
      } catch (error) {
        console.error(error);
        if (force) showNotice(`Không kiểm tra được trạng thái: ${error.message}`,"error");
      } finally {
        statusRefreshing = false;
      }
    }

    async function submitVote(candidateId) {
      if (submitting || status.phase !== "active" || hasVotedLocally()) return;

      const candidate = candidates.find(item => Number(item.id) === candidateId);
      if (!candidate) return;
      if (!confirm(`Bạn xác nhận bình chọn cho “${candidate.name}”?`)) return;

      submitting = true;
      document.querySelectorAll(".vote-btn").forEach(btn => btn.disabled = true);

      try {
        const data = await rpc("vote_submit_v3", {
          p_candidate_id:candidateId,
          p_voter_token:getVoterToken()
        });

        if (!data || data.success !== true) {
          if (String(data?.message || "").toLowerCase().includes("da binh chon")) {
            localStorage.setItem("vote_completed_session",sessionKey());
          }
          showNotice(data?.message || "Không thể ghi nhận phiếu.","error");
          await refreshStatus(true);
          return;
        }

        localStorage.setItem("vote_completed_session",sessionKey());
        showNotice(`Đã bình chọn cho “${candidate.name}”. Kết quả sẽ hiện sau khi hết giờ.`,"success");
        renderCandidates();
      } catch (error) {
        console.error(error);
        showNotice(`Có lỗi khi gửi phiếu: ${error.message}`,"error");
        renderCandidates();
      } finally {
        submitting = false;
      }
    }

    function resultPhoto(row, className) {
      const name = row.candidate_name || "";
      if (row.image_url) {
        return `<div class="${className}"><img src="${escapeHtml(row.image_url)}" alt="${escapeHtml(name)}"></div>`;
      }
      return `<div class="${className}">${escapeHtml(initials(name))}</div>`;
    }

    async function loadResults() {
      try {
        const data = await rpc("vote_results_v3");
        const rows = Array.isArray(data) ? data : [];
        resultsBox.classList.add("show");

        if (!rows.length) {
          resultList.innerHTML = '<div class="loading">Chưa có phiếu bình chọn.</div>';
          return;
        }

        const topVotes = Math.max(...rows.map(row => Number(row.vote_count || 0)));

        if (topVotes <= 0) {
          resultList.innerHTML = '<div class="loading">Cuộc bình chọn kết thúc nhưng chưa có phiếu nào.</div>';
          return;
        }

        const winners = rows.filter(row => Number(row.vote_count || 0) === topVotes);
        const others = rows.filter(row => Number(row.vote_count || 0) !== topVotes);

        const winnerTitle = winners.length > 1 ? "🏆 ĐỒNG CHIẾN THẮNG" : "🏆 NGƯỜI THẮNG CUỘC";

        const winnerCards = winners.map(row => {
          const percent = Math.max(0,Math.min(100,Number(row.percentage || 0)));
          const votes = Number(row.vote_count || 0);

          return `<article class="winner-card">
            ${resultPhoto(row,"winner-photo")}
            <h3 class="winner-name">${escapeHtml(row.candidate_name)}</h3>
            <div class="winner-votes">${votes} PHIẾU
              <span>Tổng số phiếu nhận được</span>
            </div>
            <div class="winner-percent">${percent.toFixed(1)}%</div>
          </article>`;
        }).join("");

        const othersHtml = others.length
          ? `<h3 class="other-title">Kết quả các ứng viên còn lại</h3>
             <div class="other-results">
               ${others.map(row => {
                 const percent = Math.max(0,Math.min(100,Number(row.percentage || 0)));
                 const votes = Number(row.vote_count || 0);

                 return `<article class="other-card">
                   ${resultPhoto(row,"other-photo")}
                   <div class="other-info">
                     <div class="other-name">${escapeHtml(row.candidate_name)}</div>
                     <div class="other-bar">
                       <div class="other-bar-fill" style="width:${percent}%"></div>
                     </div>
                   </div>
                   <div class="other-score">${votes}
                     <span>${percent.toFixed(1)}%</span>
                   </div>
                 </article>`;
               }).join("")}
             </div>`
          : "";

        resultList.innerHTML = `
          <section class="winner-section">
            <div class="winner-label">${winnerTitle}</div>
            ${winnerCards}
          </section>
          ${othersHtml}
        `;

        grid.style.display = "none";
      } catch (error) {
        console.error(error);
        showNotice(`Không thể tải kết quả: ${error.message}`,"error");
      }
    }

    async function initialize() {
      await Promise.all([loadCandidates(),refreshStatus(true)]);
      updateTimerDisplay();
      setInterval(updateTimerDisplay,250);
      setInterval(() => refreshStatus(false),3000);
    }

    initialize();
  </script>
</body>
</html>
